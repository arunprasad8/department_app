<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: "IBM Plex Sans", sans-serif; background: #f4f6f8; margin: 0; }
    .card { max-width: 650px; margin: 40px auto; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 10px 24px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    input, textarea, button { width: 100%; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid #cfd5dc; font: inherit; }
    button { background: #006d77; color: #fff; border: none; }
    .ok { color: #1d7f5f; margin-top: 12px; }
    .err { color: #b33a3a; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Assignment</h1>
    <p id="desc"></p>
    <p id="due"></p>
    <form id="submissionForm">
      <input id="studentName" placeholder="Your Name" required>
      <input id="regNo" placeholder="Registration Number" required>
      <input type="file" id="file" required>
      <button type="submit">Upload Submission</button>
    </form>
    <div id="status"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const assignmentId = params.get("id");
    let assignment = null;
    const status = document.getElementById("status");

    async function loadAssignment() {
      if (!assignmentId) {
        status.className = "err";
        status.textContent = "Missing assignment ID.";
        return;
      }
      try {
        const res = await fetch(`/api/public/assignment/${assignmentId}`);
        if (!res.ok) {
          throw new Error("Assignment not found.");
        }
        const data = await res.json();
        assignment = data.assignment;
        document.getElementById("title").textContent = assignment.title;
        document.getElementById("desc").textContent = assignment.description;
        document.getElementById("due").textContent = "Due Date: " + assignment.dueDate;
      } catch (err) {
        status.className = "err";
        status.textContent = err.message;
      }
    }

    document.getElementById("submissionForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!assignment) return;
      const entry = {
        studentName: document.getElementById("studentName").value.trim(),
        regNo: document.getElementById("regNo").value.trim(),
        fileName: document.getElementById("file").files[0]?.name || ""
      };

      try {
        const res = await fetch(`/api/public/assignment/${assignmentId}/submission`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(entry)
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || "Submission failed.");
        }
        status.className = "ok";
        status.textContent = "Submission uploaded successfully.";
        e.target.reset();
      } catch (err) {
        status.className = "err";
        status.textContent = err.message;
      }
    });

    loadAssignment();
  </script>
</body>
</html>
