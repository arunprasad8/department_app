<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Department Academic Suite Login</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>
    <div class="login-container">
        <h2>CS Department Academic Suite</h2>
        <p class="subline">Role-based login for exams, analytics, assignments, events, and AI teacher assistance.</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required autofocus>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
    <script src="login-script.js"></script>
</body>
</html>
